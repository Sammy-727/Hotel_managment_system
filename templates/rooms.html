
{% extends "base.html" %}{% block content %}<h1>Room Management</h1>
<div class="panel"><form class="row" method="post" action="{{url_for('add_room')}}"><input name="room_no" placeholder="Room No" required><select name="category"><option>Standard</option><option>Deluxe</option><option>Super Deluxe</option><option>Luxury</option><option>Presidential Suite</option></select><input name="price" placeholder="Price" required><select name="status"><option>Available</option><option>Occupied</option><option>Reserved</option><option>Maintenance</option><option>Cleaning</option></select><button>Add Room</button></form></div>
<form class="search"><input name="q" value="{{q}}" placeholder="Search rooms"><button>Search</button></form>
<div class="panel"><table><tr><th>ID</th><th>Room</th><th>Category</th><th>Price</th><th>Status</th><th>Action</th></tr>{% for r in rooms %}<tr><form method="post" action="{{url_for('update_room', id=r.id)}}"><td>{{r.id}}</td><td><input name="room_no" value="{{r.room_no}}"></td><td><input name="category" value="{{r.category}}"></td><td><input name="price" value="{{r.price}}"></td><td><input name="status" value="{{r.status}}"></td><td><button>Save</button><a href="{{url_for('delete_room', id=r.id)}}">Delete</a></td></form></tr>{% endfor %}</table></div>{% endblock %}
