
{% extends "base.html" %}{% block content %}<h1>Inventory</h1>
<div class="panel"><form class="row" method="post" action="{{url_for('add_inventory')}}"><input name="item_name" placeholder="Item"><input name="category" placeholder="Category"><input name="quantity" placeholder="Qty"><input name="unit" placeholder="Unit"><input name="price" placeholder="Price"><input name="reorder_level" placeholder="Reorder"><button>Add</button></form></div>
<div class="panel"><table><tr><th>ID</th><th>Item</th><th>Category</th><th>Qty</th><th>Unit</th><th>Price</th><th>Reorder</th><th>Restock</th></tr>{% for i in inventory %}<tr class="{% if i.quantity<=i.reorder_level %}warn{% endif %}"><td>{{i.id}}</td><td>{{i.item_name}}</td><td>{{i.category}}</td><td>{{i.quantity}}</td><td>{{i.unit}}</td><td>₹{{i.price}}</td><td>{{i.reorder_level}}</td><td><form method="post" action="{{url_for('restock', id=i.id)}}"><input name="quantity" placeholder="Qty"><button>Add</button></form></td></tr>{% endfor %}</table></div>{% endblock %}
