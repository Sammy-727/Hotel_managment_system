
{% extends "base.html" %}{% block content %}<h1>Employee Management</h1><div class="panel"><form class="row" method="post" action="{{url_for('add_employee')}}"><input name="name" placeholder="Name"><input name="phone" placeholder="Phone"><input name="email" placeholder="Email"><input name="designation" placeholder="Designation"><input name="salary" placeholder="Salary"><input name="shift" placeholder="Shift"><select name="status"><option>Active</option><option>Inactive</option></select><button>Add</button></form></div><div class="panel"><table><tr><th>ID</th><th>Name</th><th>Phone</th><th>Email</th><th>Designation</th><th>Salary</th><th>Shift</th><th>Status</th></tr>{% for e in employees %}<tr><td>{{e.id}}</td><td>{{e.name}}</td><td>{{e.phone}}</td><td>{{e.email}}</td><td>{{e.designation}}</td><td>₹{{e.salary}}</td><td>{{e.shift}}</td><td>{{e.status}}</td></tr>{% endfor %}</table></div>{% endblock %}
