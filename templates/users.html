
{% extends "base.html" %}{% block content %}<h1>Users / Roles</h1><div class="panel"><form class="row" method="post" action="{{url_for('add_user')}}"><input name="username" placeholder="Username"><input name="password" placeholder="Password"><select name="role"><option>Admin</option><option>Manager</option><option>Receptionist</option></select><select name="status"><option>Active</option><option>Inactive</option></select><button>Add User</button></form></div><div class="panel"><table><tr><th>ID</th><th>Username</th><th>Role</th><th>Status</th></tr>{% for u in users %}<tr><td>{{u.id}}</td><td>{{u.username}}</td><td>{{u.role}}</td><td>{{u.status}}</td></tr>{% endfor %}</table></div>{% endblock %}
